<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App Integral - Gestión de Productos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h2>Gestión de Productos</h2>
        <p>Agrega, edita y elimina productos sincronizados con Local Storage y un servidor API.</p>

        <form id="formularioProducto" novalidate>
            <input type="hidden" id="idProducto">

            <div style="margin-bottom: 12px;">
                <label for="nombreProducto" style="display:block; font-size: 12px; font-weight: 600; color: #7f8c8d;">Nombre del Producto:</label>
                <input type="text" id="nombreProducto" placeholder="Ej. Computador Portátil" style="width: 100%; border-radius: 8px; display: block; margin-top: 4px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label for="precioProducto" style="display:block; font-size: 12px; font-weight: 600; color: #7f8c8d;">Precio ($):</label>
                <input type="number" id="precioProducto" placeholder="Ej. 1200" style="width: 100%; padding: 12px 16px; font-size: 14px; border: 2px solid #e0e0e0; border-radius: 8px; outline: none; display: block; margin-top: 4px;">
            </div>

            <button type="submit" id="btnGuardar" style="width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 12px;">Guardar Producto</button>
        </form>

        <button id="btnSincronizar" style="width: 100%; padding: 10px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 24px;">Sincronizar API</button>

        <div id="mensajeEstado" style="font-size: 13px; font-weight: 600; text-align: center; margin-bottom: 15px;"></div>

        <ul id="listaProductos"></ul>
    </main>

    <script src="app.js"></script>
</body>
</html>
